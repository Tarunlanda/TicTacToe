version: '3'
services:
  postgres:
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all
    container_name: template_nk_postgres
    environment:
      - POSTGRES_DB=postgress
      - POSTGRES_USER=postgress
      - POSTGRES_PASSWORD=Iamthewinner
    expose:
      - '8080'
      - '5432'
    image: postgres:12.2-alpine
    ports:
      - '5432:5432'
      - '8080:8080'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgress -d postgress"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - data:/var/lib/postgresql/data

  nakama:
    build: .
    container_name: template_nk_backend
    depends_on:
      - postgres
    entrypoint:
      - '/bin/sh'
      - '-ecx'
      - >
        /nakama/nakama migrate up --database.address postgress:Iamthewinner@postgres:5432/postgress &&
        exec /nakama/nakama --config /nakama/data/local.yml --database.address postgress:Iamthewinner@postgres:5432/postgress --logger.level DEBUG
    expose:
      - '7349'
      - '7350'
      - '7351'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7350/']
      interval: 10s
      timeout: 5s
      retries: 5
    links:
      - 'postgres:db'
    ports:
      - '7349:7349'
      - '7350:7350'
      - '7351:7351'
    restart: unless-stopped

volumes:
  data:
